<!DOCTYPE html>
<html>
<head>
  <title>Signal & Sprout</title>

  <style>
    body{
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      text-align:center;
      background:#f6f6f6;
      margin:0;
      padding:60px;
    }

    h1{
      font-size:42px;
      margin-bottom:10px;
    }

    p{
      color:#555;
      margin-bottom:50px;
    }

    .apps{
      display:flex;
      justify-content:center;
      gap:60px;
      flex-wrap:wrap;
    }

    .app{
      background:white;
      padding:30px;
      border-radius:18px;
      width:220px;
      box-shadow:0 10px 25px rgba(0,0,0,0.08);
      transition:transform .2s;
    }

    .app:hover{
      transform:translateY(-5px);
    }

    img{
      width:100px;
      margin-bottom:15px;
    }

    a{
      text-decoration:none;
      color:black;
    }

    h2{
      margin:0;
    }

  </style>
</head>

<body>

<h1>Signal & Sprout</h1>
<p>Simple tools for growing families.</p>

<div class="apps">

<a href="#">
<div class="app">
<img src="moneysprout-icon.png">
<h2>MoneySprout</h2>
<p>Budgeting made simple</p>
</div>
</a>

<a href="#">
<div class="app">
<h2>Grow</h2>
<p>Baby growth tracking</p>
</div>
</a>

</div>

</body>
</html>
