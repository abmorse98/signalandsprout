<!DOCTYPE html>
<html>
<head>

<title>Signal & Sprout</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
margin:0;
background:#f5f5f7;
color:#111;
text-align:center;
}

.container{
max-width:1100px;
margin:auto;
padding:80px 20px;
}

.logo{
width:140px;
margin-bottom:20px;
}

h1{
font-size:48px;
margin:10px 0;
}

.tagline{
color:#666;
font-size:18px;
margin-bottom:50px;
}

.apps{
display:flex;
justify-content:center;
gap:50px;
flex-wrap:wrap;
}

.card{
background:white;
border-radius:20px;
padding:40px;
width:260px;
box-shadow:0 25px 40px rgba(0,0,0,0.08);
transition:transform .2s ease;
text-decoration:none;
color:black;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:90px;
margin-bottom:20px;
}

.card h2{
margin:10px 0;
font-size:22px;
}

.card p{
color:#666;
}

.appstore{
margin-top:60px;
}

.appstore a{
display:inline-block;
background:black;
color:white;
padding:16px 28px;
border-radius:10px;
font-size:16px;
text-decoration:none;
}

footer{
margin-top:100px;
padding:40px;
color:#777;
font-size:14px;
}

footer a{
margin:0 10px;
text-decoration:none;
color:#555;
}

</style>

</head>

<body>

<div class="container">

<img src="signalandsprout-logo.png" class="logo">

<h1>Signal & Sprout</h1>

<p class="tagline">
Simple tools for growing families
</p>

<div class="apps">

<a href="/moneysprout" class="card">

<img src="moneysprout-icon.png">

<h2>MoneySprout</h2>

<p>Budgeting made simple</p>

</a>

<div class="card">

<h2>Grow</h2>

<p>Baby growth tracking</p>

</div>

</div>

<div class="appstore">

<a href="https://apps.apple.com/us/app/moneysprout-grow-your-budget/id6760194060" target="_blank">

Download MoneySprout on the App Store

</a>

</div>

<footer>

<p>© 2026 Signal & Sprout</p>

<p>

<a href="/privacy.html">Privacy Policy</a> |

<a href="/terms.html">Terms of Service</a> |

<a href="/support.html">Support</a>

</p>

</footer>

</div>

</body>
</html>
