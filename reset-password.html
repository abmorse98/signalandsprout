<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Reset Password | MoneySprout</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f5f7f6;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:40px;
border-radius:14px;
width:360px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
text-align:center;
}

.logo{
font-size:24px;
font-weight:700;
margin-bottom:8px;
}

.subtitle{
color:#666;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin-bottom:12px;
border-radius:8px;
border:1px solid #ddd;
font-size:16px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
background:#17b67d;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#149b6a;
}

.error{
color:#e53935;
margin-top:10px;
display:none;
}

</style>

</head>
<body>

<div class="card" id="card">

<div class="logo">🌱 MoneySprout</div>

<h2>Reset your password</h2>

<div class="subtitle">
Enter a new password for your account
</div>

<input type="password" id="password" placeholder="New password">

<input type="password" id="confirm" placeholder="Confirm password">

<button onclick="resetPassword()">Reset Password</button>

<div id="error" class="error"></div>

</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase = createClient(
"https://olbbyxaonitxagqauuwb.supabase.co",
"YOUR_PUBLIC_ANON_KEY"
)

const card = document.getElementById("card")

/* ---------------------------
   TOKEN DETECTION (CRITICAL)
--------------------------- */

const hashParams = new URLSearchParams(window.location.hash.substring(1))
const accessToken = hashParams.get("access_token")
const refreshToken = hashParams.get("refresh_token")

if(accessToken){

await supabase.auth.setSession({
access_token: accessToken,
refresh_token: refreshToken
})

}

/* ---------------------------
   CHECK IF SESSION EXISTS
--------------------------- */

const { data:{ session } } = await supabase.auth.getSession()

if(!session){

card.innerHTML = `

<h2>Reset Link Expired</h2>

<p style="color:#666;margin-top:10px;margin-bottom:25px;">
This password reset link has expired or is invalid.
</p>

<a href="https://signalandsprout.com"
style="
display:inline-block;
padding:14px 22px;
background:#17b67d;
color:white;
border-radius:8px;
text-decoration:none;
font-weight:600;
">
Request New Reset Link
</a>

`

}

/* ---------------------------
   PASSWORD RESET
--------------------------- */

window.resetPassword = async function(){

const password = document.getElementById("password").value
const confirm = document.getElementById("confirm").value
const errorBox = document.getElementById("error")

errorBox.style.display="none"

if(password.length < 6){

errorBox.innerText="Password must be at least 6 characters."
errorBox.style.display="block"
return

}

if(password !== confirm){

errorBox.innerText="Passwords do not match."
errorBox.style.display="block"
return

}

const { error } = await supabase.auth.updateUser({
password: password
})

if(error){

errorBox.innerText = error.message
errorBox.style.display="block"
return

}

/* SUCCESS SCREEN */

card.innerHTML = `

<div style="text-align:center">

<div style="
width:60px;
height:60px;
border-radius:50%;
background:#17b67d;
display:flex;
align-items:center;
justify-content:center;
margin:0 auto 20px auto;
font-size:30px;
color:white;
">
✓
</div>

<h2>Password Updated</h2>

<p style="color:#666;margin-bottom:25px;">
Your password has been successfully reset.
</p>

<a href="moneysprout://login"
style="
display:inline-block;
padding:14px 22px;
background:#17b67d;
color:white;
border-radius:8px;
text-decoration:none;
font-weight:600;
">
Return to MoneySprout
</a>

</div>

`

}

</script>

</body>
</html>
