<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password | MoneySprout</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f6f7f8;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:40px;
border-radius:14px;
width:360px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
text-align:center;
}

.logo{
font-size:26px;
font-weight:700;
margin-bottom:10px;
}

h2{
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin-bottom:14px;
border-radius:8px;
border:1px solid #ddd;
font-size:16px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
background:#00c38a;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#00a876;
}

.success{
display:none;
color:#00a876;
margin-top:15px;
}

.error{
display:none;
color:#e53935;
margin-top:15px;
}

</style>
</head>

<body>

<div class="card">

<div class="logo">🌱 MoneySprout</div>

<h2>Reset your password</h2>

<input id="password" type="password" placeholder="New password">

<input id="confirm" type="password" placeholder="Confirm password">

<button onclick="resetPassword()">Reset Password</button>

<div id="success" class="success">
Password updated successfully. You can now return to the app.
</div>

<div id="error" class="error"></div>

</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase = createClient(
"https://olbbyxaonitxagqauuwb.supabase.co",
"YOUR_PUBLIC_ANON_KEY"
)

async function resetPassword(){

const password = document.getElementById("password").value
const confirm = document.getElementById("confirm").value
const errorBox = document.getElementById("error")
const successBox = document.getElementById("success")

errorBox.style.display="none"

if(password.length < 6){
errorBox.innerText="Password must be at least 6 characters."
errorBox.style.display="block"
return
}

if(password !== confirm){
errorBox.innerText="Passwords do not match."
errorBox.style.display="block"
return
}

const { error } = await supabase.auth.updateUser({
password: password
})

if(error){
errorBox.innerText=error.message
errorBox.style.display="block"
return
}

successBox.style.display="block"

}

</script>

</body>
</html>
